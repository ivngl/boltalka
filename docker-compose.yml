services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: boltalka
      POSTGRES_PASSWORD: boltalka
      POSTGRES_DB: boltalka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boltalka"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:4000"
    environment:
      DATABASE_URL: postgresql://boltalka:boltalka@postgres:5432/boltalka
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/server/uploads

volumes:
  pgdata:
  uploads:
