services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: boltalka
      POSTGRES_PASSWORD: boltalka
      POSTGRES_DB: boltalka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
