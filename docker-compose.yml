x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: boltalka
      POSTGRES_PASSWORD: boltalka
      POSTGRES_DB: boltalka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - boltalka-net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - boltalka-net
    logging: *default-logging

  coturn:
    image: instrumentisto/coturn:latest
    command:
      - -n
      - --listening-port=3478
      - --min-port=40000
      - --max-port=40999
      - --realm=boltalka
      - --static-auth-secret=${TURN_SECRET?Required}
      - --fingerprint
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "40000-40999:40000-40999/udp"
    restart: unless-stopped
    networks:
      - boltalka-net
    logging: *default-logging

  app:
    build: .
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://boltalka:boltalka@postgres:5432/boltalka
      JWT_SECRET: ${JWT_SECRET?Required}
      REDIS_URL: redis://redis:6379
      PORT: 4000
      TURN_SECRET: ${TURN_SECRET}
      TURN_URL: ${TURN_URL:-turn:coturn:3478}
      URL_PROTOCOL: ${URL_PROTOCOL:-http}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
    volumes:
      - ./client:/app/client
      - /app/client/node_modules
      - uploads:/app/server/uploads
    restart: unless-stopped
    networks:
      - boltalka-net
    logging: *default-logging

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot-webroot:/var/www/html
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - boltalka-net
    logging: *default-logging

volumes:
  pgdata:
  uploads:

networks:
  boltalka-net:
