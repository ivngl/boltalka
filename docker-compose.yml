services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: boltalka
      POSTGRES_PASSWORD: boltalka
      POSTGRES_DB: boltalka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - boltalka-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - boltalka-net

  app:
    build: .
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://boltalka:boltalka@postgres:5432/boltalka
      JWT_SECRET: ${JWT_SECRET?Required}
      REDIS_URL: redis://redis:6379
      PORT: 4000
    volumes:
      - ./client:/app/client
      - /app/client/node_modules
      - uploads:/app/server/uploads
    restart: unless-stopped
    networks:
      - boltalka-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - boltalka-net

volumes:
  pgdata:
  uploads:

networks:
  boltalka-net:
