resolver 127.0.0.11 valid=5s;

log_format json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_x_forwarded_for":"$http_x_forwarded_for"'
'}';

access_log /var/log/nginx/access.log json;
error_log /var/log/nginx/error.log warn;

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/108.165.32.73.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/108.165.32.73.sslip.io/privkey.pem;

    client_max_body_size 55M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        set $backend "http://app:4000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name _;
    return 301 https://108.165.32.73.sslip.io$request_uri;
}
